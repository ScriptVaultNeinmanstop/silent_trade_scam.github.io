<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Trade</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Silent Trade</h1>
  <p class="subtitle">Made for Sab</p>
</header>

<section class="user-card">
  <label for="userId">Target User ID</label>
  <input id="userId" type="text" placeholder="Enter Roblox User ID">
</section>

<section class="brainrots-section">
  <input id="searchBar" type="text" placeholder="Search Brainrots...">
  <div id="brainrotList" class="brainrot-grid"></div>
</section>

<section class="buttons">
  <button id="generateBtn">Generate Script</button>
</section>

<section class="output">
  <pre id="scriptOutput"></pre>
  <button id="copyBtn">Copy Script</button>
</section>

<footer>
  <p>By Silent and nga_alt</p>
</footer>

<script src="brainrots.js"></script>
<script src="script.js"></script>
</body>
</html>
