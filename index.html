<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Trade</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Silent Trade Scam</h1>
  <p class="subtitle">Made for Sab</p>
</header>

<main>
  <section class="user-input-card">
    <label for="target-id">Target User ID</label>
    <input type="number" id="target-id" placeholder="Enter Roblox User ID">
  </section>

  <section class="brainrots-section">
    <h2>Brainrots for trade</h2>
    <input type="text" id="brainrot-search" placeholder="Search Brainrots...">
    <div id="brainrot-grid"></div>
  </section>

  <button id="generate-btn">Generate Script</button>

  <pre id="script-output"></pre>
  <button id="copy-btn" style="display:none;">Copy Script</button>
</main>

<footer>
  <p>By Silent and nga_alt</p>
</footer>

<script src="script.js"></script>
</body>
</html>
